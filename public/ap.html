

<!-- pay.html page to input amount. after then directed to checkout page just to enter user_code (sender). value will go into dev wallet by api key know dev -->

<!DOCTYPE html>
<html>
<head>
  <title>Pay</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

  <div class="bg-white p-6 rounded-2xl shadow w-96">
    <h2 class="text-xl font-bold mb-4">Make Payment    HAAHAHAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA</h2>

    <form action="/pay" method="POST">
      
      <input 
        type="number" 
        name="amount" 
        placeholder="Enter amount" 
        class="w-full p-2 border rounded mb-4"
        required
      />

      <button 
        class="bg-blue-600 text-white w-full p-2 rounded">
        Continue
      </button>

    </form>
  </div>

</body>
</html>
